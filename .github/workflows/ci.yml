name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Code Quality (Flake8 & Mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install linters
        run: python -m pip install flake8 mypy
      - name: Run Flake8
        run: flake8 collatz/ tests/
      - name: Run Mypy
        run: mypy collatz/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
        python-version: ["3.9", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with test dependencies
        run: python -m pip install -e ".[test]"
      - name: Run test suite
        run: python -m pytest tests/ -q

  reproduce:
    name: Reproduce paper results
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Regenerate every number quoted in the paper
        run: python reproduce_paper_results.py
